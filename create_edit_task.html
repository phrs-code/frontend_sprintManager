<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SprintManager | Criar Tarefa</title>
  <link rel="stylesheet" href="./css/style.css" />
</head>

<body class="create-edit-task-page">
  <main class="create-edit-task-container">
    <section class="create-edit-task-card" aria-labelledby="create-edit-task-title">
      <a href="dashboard.html" class="close-button" aria-label="Voltar ao Dashboard">&times;</a>
      <div class="create-edit-task-icon" aria-hidden="true">✓</div>

      <h1 id="create-edit-task-title">Nova Tarefa</h1>

      <form class="create-edit-task-form" id="createEditTaskForm">
        <label for="taskTitle">TÍTULO DA TAREFA</label>
        <input id="taskTitle" name="taskTitle" type="text" placeholder="Digite o título da tarefa" autocomplete="off" />
        <label for="taskDescription">DESCRIÇÃO DA TAREFA</label>
        <textarea id="taskDescription" name="taskDescription" placeholder="Descreva os detalhes da tarefa"
          autocomplete="off"></textarea>

        <label for="status">STATUS</label>
        <select name="status" id="status">
            <option value="concluida">Pendente</option>
             <option value="pendente">Em andamento</option>
             <option value="andamento">Concluída</option>
        </select>

        <label for="category">CATEGORIA</label>
        <select name="category" id="category">
          <option value="Desenvolvimento">Desenvolvimento</option>
          <option value="Design UX">Design UX</option>
          <option value="Financeiro">Financeiro</option>
          <option value="Marketing">Marketing</option>
          <option value="Dados">Dados</option>
        </select>


        <label for="priority">PRIORIDADE</label>
        <select name="priority" id="priority">
            <option value="baixa">Baixa</option>
             <option value="media">Média</option>
             <option value="alta">Alta</option>
        </select>

        <label for="deadline">DATA LIMITE</label>
        <input id="deadline" name="deadline" type="date" />


        <div class="save-clear-button-row">

          <button id="cancelButton" type="button" onclick="window.location.href='dashboard.html'">
            Cancelar
          </button>

          <button id="saveButton" type="submit">
            Salvar
          </button>

        </div>


        <p class="error-message" id="error-message" aria-live="polite"></p>

      </form>

    </section>
  </main>

  <script src="js/create_edit_task.js"></script>
</body>

</html>
